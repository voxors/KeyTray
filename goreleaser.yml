version: 2

project_name: KeyTray
before:
  hooks:
    - bash -c "sed 's/\{\{VERSION\}\}/{{ .Version }}/g' keytray.desktop.tmpl > keytray.desktop"
builds:
  - main: ./src/cmd/
    goos:
      - linux
    goarch:
      - amd64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
nfpms:
  - package_name: KeyTray
    homepage: https://github.com/voxors/KeyTray
    maintainer: Jonathan Croteau-Dicaire<jonathan.croteau.dicaire@gmail.com>
    description: Tray application to show battery level of Keychron devices
    vendor: Jonathan Croteau-Dicaire
    license: MIT
    contents:
      - src: keytray.desktop
        dst: /usr/share/applications/keytray.desktop
      - src: src/cmd/assets/keytray.svg
        dst: /usr/share/icons/hicolor/scalable/apps/keytray.svg
    dependencies:
      - libudev1
    formats:
      - deb
      - rpm
      - archlinux
    rpm:
      signature:
        key_file: '{{ envOrDefault "GPG_KEY_PATH" "gpg/key.asc" }}'
    deb:
      signature:
        key_file: '{{ envOrDefault "GPG_KEY_PATH" "gpg/key.asc" }}'
